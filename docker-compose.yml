# Run with:  docker compose up --build
# Stop with: docker compose down

services:
  sahay:
    build: .
    image: sahay:latest
    container_name: sahay
    ports:
      - "5000:5000"
    # Reads ANTHROPIC_API_KEY (and anything else) from a local .env file.
    # The .env file is gitignored and dockerignored — never bundled.
    env_file:
      - path: .env
        required: false
    environment:
      SAHAY_HOST: "0.0.0.0"
      SAHAY_PORT: "5000"
      SAHAY_DEBUG: "0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/schemes', timeout=3)"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 10s
